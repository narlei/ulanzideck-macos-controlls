<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 2400 1600" width="2400" height="1600"><defs><linearGradient id="id8" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a0e1a"/><stop offset="1" stop-color="#0d1117"/></linearGradient><radialGradient id="id9" cx="0.14" cy="0.1" r="0.5"><stop offset="0" stop-color="rgba(46,86,170,0.38)"/><stop offset="1" stop-color="rgba(46,86,170,0)"/></radialGradient></defs><rect width="2400" height="1600" fill="url(#id8)"/><rect width="2400" height="1600" fill="url(#id9)"/><defs><linearGradient id="id7" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#3ecf6b"/><stop offset="0.55" stop-color="#22d3ee"/><stop offset="1" stop-color="#4772fa"/></linearGradient></defs><circle cx="138" cy="335" r="9" fill="#22d3ee"/><text x="164" y="345" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="32" font-weight="700" fill="#9aa2b4" text-anchor="start" letter-spacing="6">TAP-TO-CANCEL SAFETY</text><text x="130" y="500" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="118" font-weight="800" fill="#ffffff" text-anchor="start">Nothing fires</text><text x="130" y="630" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="118" font-weight="800" fill="url(#id7)" text-anchor="start">by accident.</text><text x="130" y="770" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="42" font-weight="500" fill="#aeb6c6" text-anchor="start">Power actions arm a visible countdown on the</text><text x="130" y="828" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="42" font-weight="500" fill="#aeb6c6" text-anchor="start">key itself. Tap again to cancel. That’s it.</text><rect x="130" y="1097" width="44" height="44" rx="12.32" fill="rgba(34,211,238,0.14)" stroke="#22d3ee" stroke-width="2"/><path d="M 141 1119.88 L 149.36 1127.8 L 163.44 1110.2" fill="none" stroke="#22d3ee" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/><text x="194" y="1130" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="600" fill="#e6e9f0" text-anchor="start">Pick 5, 10 or 30 seconds per key</text><rect x="130" y="1197" width="44" height="44" rx="12.32" fill="rgba(34,211,238,0.14)" stroke="#22d3ee" stroke-width="2"/><path d="M 141 1219.88 L 149.36 1227.8 L 163.44 1210.2" fill="none" stroke="#22d3ee" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/><text x="194" y="1230" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="600" fill="#e6e9f0" text-anchor="start">Progress ring drains in real time</text><rect x="130" y="1297" width="44" height="44" rx="12.32" fill="rgba(34,211,238,0.14)" stroke="#22d3ee" stroke-width="2"/><path d="M 141 1319.88 L 149.36 1327.8 L 163.44 1310.2" fill="none" stroke="#22d3ee" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/><text x="194" y="1330" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="600" fill="#e6e9f0" text-anchor="start">One more tap cancels instantly</text><rect x="1130" y="520" width="340" height="490" rx="30" fill="#15181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="1154" y="520" width="292" height="6" rx="3" fill="#F25555"/><image href="data:image/svg+xml;base64," x="1160" y="560" width="280" height="280"/><text x="1300" y="910" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">1 · Tap</text><text x="1300" y="958" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#8b93a7" text-anchor="middle">armed &amp; ready</text><path d="M 1490.5 743 l 24 22 l -24 22" fill="none" stroke="#5b6272" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><rect x="1535" y="520" width="340" height="490" rx="30" fill="#15181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="1559" y="520" width="292" height="6" rx="3" fill="#F25555"/><image href="data:image/svg+xml;base64," x="1565" y="560" width="280" height="280"/><text x="1705" y="910" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">2 · Countdown</text><text x="1705" y="958" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#8b93a7" text-anchor="middle">tap again to cancel</text><path d="M 1895.5 743 l 24 22 l -24 22" fill="none" stroke="#5b6272" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><rect x="1940" y="520" width="340" height="490" rx="30" fill="#15181f" stroke="rgba(255,255,255,0.07)" stroke-width="1"/><rect x="1964" y="520" width="292" height="6" rx="3" fill="#F25555"/><image href="data:image/svg+xml;base64," x="1970" y="560" width="280" height="280"/><text x="2110" y="910" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="800" fill="#ffffff" text-anchor="middle">3 · Fires</text><text x="2110" y="958" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="30" font-weight="600" fill="#8b93a7" text-anchor="middle">only if you let it</text></svg>