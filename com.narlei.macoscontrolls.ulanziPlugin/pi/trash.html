<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui,viewport-fit=cover" />
  <title>Empty Trash</title>
  <link rel="stylesheet" href="libs/css/udpi.css">
  <style>.udpi-item-label { width: 150px; }</style>
</head>
<body>
  <div class="udpi-wrapper hidden">
    <form id="property-inspector">
      <div class="udpi-item" style="margin-left:6px; color:#8A93A6; font-size:12px; line-height:1.4;"
        data-localize="trashHint">
        Tap to empty the Trash immediately, with no confirmation. Finder’s “warn before emptying” option is disabled so no dialog is shown.
      </div>
    </form>
  </div>

  <script>window.ACTION_UUID = 'com.narlei.macoscontrolls.controls.trash';</script>
  <script src="libs/js/constants.js"></script>
  <script src="libs/js/eventEmitter.js"></script>
  <script src="libs/js/timers.js"></script>
  <script src="libs/js/utils.js"></script>
  <script src="libs/js/ulanzideckApi.js"></script>
  <script src="inspector.js"></script>
</body>
</html>
